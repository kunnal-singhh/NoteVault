version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: notevault_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: notevault_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/notevault
      - JWT_SECRET=super_secret_key_change_me
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=development
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3000/api
    container_name: notevault_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
